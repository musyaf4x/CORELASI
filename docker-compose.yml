name: corelasi

services:
  postgres:
    image: postgres:16-alpine
    container_name: corelasi-postgres
    restart: unless-stopped
    env_file:
      - ./corelasi-backend/.postgres.env
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - corelasi_postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  corelasi_postgres_data:
    name: corelasi_postgres_data
